services:

  backend:

    build:
      context: .

    image: tea-catalog-api

    container_name: tea-catalog-api

    env_file:
      - .env

    ports:
      - "8000:8000"

    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3